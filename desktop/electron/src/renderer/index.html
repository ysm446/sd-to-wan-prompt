<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WAN Prompt Desktop</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>WAN Prompt Desktop</h1>
        <p id="health">Backend: checking...</p>
      </header>

      <nav class="tab-nav" aria-label="Main Tabs">
        <button class="tab-btn active" data-tab-target="tab-prompt" id="tabPromptBtn">Prompt Generation</button>
        <button class="tab-btn" data-tab-target="tab-models" id="tabModelsBtn">Model Management</button>
        <button class="tab-btn" data-tab-target="tab-settings" id="tabSettingsBtn">Settings</button>
      </nav>

      <section class="tab-panel active" id="tab-prompt">
        <div class="prompt-grid">
          <div class="panel area-preview">
            <h2>Image Preview</h2>
            <div id="dropZone" class="preview-wrap drop-zone">
              <div id="dropHint" class="drop-hint">Drop image file here</div>
              <img id="imagePreview" alt="Dropped image preview" />
            </div>
          </div>

          <div class="panel area-image">
            <h2>Image</h2>
            <input id="imagePathInput" type="text" placeholder="D:\\images\\input.png" />
            <button id="parseImageBtn">Parse Image Metadata</button>

            <details id="metadataDetails">
              <summary>Parsed Metadata</summary>
              <pre id="metadataOut">-</pre>
            </details>
          </div>

          <div class="panel area-output">
            <h2>Generated Prompt</h2>
            <textarea id="outputOut" rows="18"></textarea>
          </div>

          <div class="panel area-generation">
            <h2>Generation</h2>
            <label>Additional Instruction</label>
            <textarea id="instructionInput" rows="4"></textarea>
            <fieldset class="section-box">
              <legend>Output Sections</legend>
              <label class="inline"><input type="checkbox" class="section-check" value="scene" checked /> Scene</label>
              <label class="inline"><input type="checkbox" class="section-check" value="action" checked /> Action</label>
              <label class="inline"><input type="checkbox" class="section-check" value="camera" checked /> Camera</label>
              <label class="inline"><input type="checkbox" class="section-check" value="style" checked /> Style</label>
              <label class="inline"><input type="checkbox" class="section-check" value="prompt" checked /> Final Prompt</label>
            </fieldset>

            <button id="generateBtn" class="primary">Generate WAN Prompt</button>
            <button id="savePromptBtn">Save Prompt Text (same folder as image)</button>
          </div>
        </div>
      </section>

      <section class="tab-panel" id="tab-models">
        <div class="panel">
          <h2>Local Models</h2>
          <div class="row">
            <button id="refreshModelsBtn">Refresh Models</button>
            <button id="unloadModelBtn">Unload</button>
          </div>
          <select id="modelSelect"></select>
          <button id="loadModelBtn">Load Selected Model</button>

          <h2>Download Model</h2>
          <div class="grid2">
            <input id="repoIdInput" type="text" placeholder="Qwen/Qwen2.5-VL-7B-Instruct" />
            <input id="localNameInput" type="text" placeholder="local model name (optional)" />
          </div>
          <button id="downloadModelBtn">Download Model</button>
        </div>
      </section>

      <section class="tab-panel" id="tab-settings">
        <div class="panel">
          <h2>Generation Settings</h2>
          <div class="grid2">
            <label>Language
              <select id="languageSelect">
                <option>English</option>
                <option>日本語</option>
              </select>
            </label>
            <label>Style
              <select id="styleSelect">
                <option value="">none</option>
                <option value="calm">calm</option>
                <option value="dynamic">dynamic</option>
                <option value="cinematic" selected>cinematic</option>
                <option value="anime">anime</option>
              </select>
            </label>
          </div>

          <div class="grid2">
            <label>Temperature
              <input id="temperatureInput" type="number" step="0.1" min="0" max="2" value="0.7" />
            </label>
            <label>Max Tokens
              <input id="maxTokensInput" type="number" min="64" step="64" value="1024" />
            </label>
          </div>

          <label class="inline">
            <input id="autoUnloadInput" type="checkbox" />
            Auto unload model after generation
          </label>

          <button id="saveSettingsBtn">Save Settings</button>
        </div>
      </section>

      <section class="panel status-panel">
        <h2>Status</h2>
        <pre id="statusOut">-</pre>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
